name: Validate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    name: Validate app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # The npm bundled with the Node 20 runner image intermittently crashes
      # mid-install ("Exit handler never called!") yet exits 0, leaving a
      # partial node_modules. Pin a fixed npm before installing.
      - name: Update npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm run validate
